services:
  - type: web
    name: servicio-mantenimiento-api
    runtime: node
    plan: starter
    buildCommand: npm ci
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PGSSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_LOGIN_MAX
        value: "10"
      - key: RATE_LIMIT_LOGIN_WINDOW_MIN
        value: "15"
